name: SCA Pipeline

on:
  pull_request:
  workflow_dispatch:

jobs:
  dependency_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      ####################################################
      # TODO: Choose ONE: Grype OR Trivy
      # WARNING: You must point the tool to ./vulnerable-app
      # otherwise it will not find package.json.
      ####################################################
      - name: Install dependencies
        run: |
          cd vulnerable-app
          npm install

      - name: Trivy
        uses: aquasecurity/trivy-action@0.35.0
      
        with:
          scan-type: fs
          scan-ref: ./vulnerable-app/
          scanners: vuln,license
      ####################################################
      # TODO: Fail build if severity threshold exceeded
      # REQUIRED: This must return exit code 1 if 
      # High/Critical vulnerabilities are found.
      ####################################################
          severity: "CRITICAL,HIGH"
      ####################################################
      # TODO: Add supply-chain control
      # (e.g., license policy or dependency gate) 
      ####################################################
          trivy-config: .github/trivy_config.yml
          output: trivy-scan-report-artifact.sarif
          exit-code: 1
      ####################################################
      # TODO: Upload scan report artifact
      ####################################################
      - name: Upload Scan Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report-artifact
          path: trivy-scan-report-artifact.sarif
